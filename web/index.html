<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Interactive quiz app with real-time multiplayer support. Join quiz games, create quizzes, and compete with friends!">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Open Graph meta tags for social sharing -->
  <meta property="og:title" content="Quiz App - Interactive Multiplayer Quiz Game">
  <meta property="og:description" content="Join interactive quiz games, create your own quizzes, and compete with friends in real-time!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://quizapp.com">
  <meta property="og:image" content="https://quizapp.com/icons/Icon-512.png">
  
  <!-- Twitter meta tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Quiz App - Interactive Multiplayer Quiz Game">
  <meta name="twitter:description" content="Join interactive quiz games, create your own quizzes, and compete with friends in real-time!">
  <meta name="twitter:image" content="https://quizapp.com/icons/Icon-512.png">
  
  <!-- Deep linking support -->
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://quizapp.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="quiz_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Quiz App - Interactive Multiplayer Quiz Game</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
